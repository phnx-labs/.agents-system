name: qwen
host:
  agent: claude
env:
  ANTHROPIC_BASE_URL: https://openrouter.ai/api
  ANTHROPIC_MODEL: qwen/qwen3-coder-next
  ANTHROPIC_SMALL_FAST_MODEL: qwen/qwen3-coder-next
auth:
  envVar: ANTHROPIC_AUTH_TOKEN
  keychainItem: agents-cli.openrouter.token
description: Qwen3 Coder Next via OpenRouter (256K ctx, $0.15/$0.80 per 1M,
  sparse MoE 80B/3B active). Latest coding-specific Qwen (Feb 2026). PRINT-SAFE
  — works with `agents run --print`.
preset: qwen
provider: openrouter
