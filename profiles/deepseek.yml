name: deepseek
host:
  agent: claude
env:
  ANTHROPIC_BASE_URL: https://openrouter.ai/api
  ANTHROPIC_MODEL: deepseek/deepseek-chat-v3-0324
  ANTHROPIC_SMALL_FAST_MODEL: deepseek/deepseek-chat-v3-0324
auth:
  envVar: ANTHROPIC_AUTH_TOKEN
  keychainItem: agents-cli.openrouter.token
description: DeepSeek Chat V3 (0324) via OpenRouter. Latest DeepSeek Chat
  variant that ignores thinking:enabled. PRINT-SAFE. The newer V3.2 /
  V3.1-Terminus / V3.2-Speciale are reasoning variants — use `--model
  deepseek/deepseek-v3.2` to override if you want those for interactive use.
preset: deepseek
provider: openrouter
