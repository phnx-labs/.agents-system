name: kimi-chat
host:
  agent: claude
env:
  ANTHROPIC_BASE_URL: https://openrouter.ai/api
  ANTHROPIC_MODEL: moonshotai/kimi-k2-0905
  ANTHROPIC_SMALL_FAST_MODEL: moonshotai/kimi-k2-0905
auth:
  envVar: ANTHROPIC_AUTH_TOKEN
  keychainItem: agents-cli.openrouter.token
description: Kimi K2 0905 via OpenRouter (262K ctx, $0.40/$2.00 per 1M).
  Non-reasoning sibling of K2.5 — slightly older but PRINT-SAFE, works
  end-to-end with `agents run --print` and in scripts/automation.
preset: kimi-chat
provider: openrouter
