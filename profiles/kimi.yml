name: kimi
host:
  agent: claude
env:
  ANTHROPIC_BASE_URL: https://openrouter.ai/api
  ANTHROPIC_MODEL: moonshotai/kimi-k2.5
  ANTHROPIC_SMALL_FAST_MODEL: moonshotai/kimi-k2.5
auth:
  envVar: ANTHROPIC_AUTH_TOKEN
  keychainItem: agents-cli.openrouter.token
description: "Kimi K2.5 via OpenRouter (262K ctx, $0.38/$1.72 per 1M). Top Kimi:
  99% HumanEval, 76.8% SWE-bench. REASONING — works interactively, but `agents
  run --print` returns empty stdout. Use `kimi-chat` preset for scripting."
preset: kimi
provider: openrouter
