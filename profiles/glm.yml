name: glm
host:
  agent: claude
env:
  ANTHROPIC_BASE_URL: https://openrouter.ai/api
  ANTHROPIC_MODEL: z-ai/glm-5
  ANTHROPIC_SMALL_FAST_MODEL: z-ai/glm-5
auth:
  envVar: ANTHROPIC_AUTH_TOKEN
  keychainItem: agents-cli.openrouter.token
description: "GLM 5 via OpenRouter (80K ctx, $0.72/$2.30 per 1M). #1 Chatbot
  Arena ELO (1451) among open-weight models on BenchLM.ai (Apr 2026).
  Prompt-complexity-dependent reasoning — Claude Code's 38K system prompt
  typically triggers thinking blocks, so --print is unreliable. Interactive use
  is fine."
preset: glm
provider: openrouter
