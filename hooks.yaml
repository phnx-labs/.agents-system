# Hook lifecycle event registration
# agents-cli reads this to register hooks in settings.json / hooks.json.
# Hooks without entries here are file-only (copied but not registered).
#
# Script paths are relative to ~/.agents/hooks/.
# For claude/codex, `events` are used as-is. For gemini, UserPromptSubmit
# is translated to BeforeAgent by the registrar (gemini has no native
# UserPromptSubmit event).
#
# Prompt-rewriting works only on claude. codex + gemini can only APPEND
# via additionalContext — the shortcut token stays in the prompt, the
# expansion is appended as dev context. Acceptable degradation.

linear-tasks:
  script: 03-linear-inject-tasks-context.sh
  events: [SessionStart]
  timeout: 15
  agents: [claude]

expand-promptcuts:
  script: 02-expand-prompt-user-shortcuts.sh
  events: [UserPromptSubmit]
  timeout: 5
  agents: [claude, codex, gemini]

expand-bang-commands:
  script: 02-expand-prompt-bang-commands.py
  events: [UserPromptSubmit]
  timeout: 10
  agents: [claude, codex, gemini]

stop-completion-gate:
  script: 00-agent-verify-work-complete.sh
  events: [Stop]
  timeout: 10
  agents: [claude]
