hooks:
  session-start-autosync:
    agents:
      - claude
      - codex
      - gemini
    events:
      - SessionStart
    script: 05-session-start-autosync.sh
    timeout: 5
  attention-sentinel:
    agents:
      - claude
    events:
      - Notification
      - Stop
      - UserPromptSubmit
    script: 06-attention-sentinel.sh
    timeout: 5
  inject-device-topology:
    agents:
      - claude
      - codex
      - gemini
    events:
      - SessionStart
    script: 07-inject-device-topology.sh
    timeout: 5
  inject-session-id:
    agents:
      - claude
    events:
      - SessionStart
    script: 07-inject-session-id.sh
    timeout: 5
