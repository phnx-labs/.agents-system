hooks:
  mq-read-nudge:
    # PreToolUse on Read: when the agent is about to read a large (>=16 KiB)
    # supported file whole, inject a one-time (per session + per file)
    # suggestion to map it with `mq .tree` and extract only the needed section.
    # Advisory, never blocks; skips targeted reads (offset/limit) and small
    # files. Closes the reach-gap behind the measured pattern — mq used 0x
    # across 835 sessions / 3 days while 62% of tool calls were context reads.
    # Claude only — relies on PreToolUse additionalContext.
    agents:
      - claude
    events:
      - PreToolUse
    matcher: Read
    script: 10-mq-read-nudge.py
    timeout: 5
  session-start-autosync:
    agents:
      - claude
      - codex
      - gemini
    events:
      - SessionStart
    script: 05-session-start-autosync.sh
    timeout: 5
  verify-work-complete:
    # Stop gate: (a) blocks done-claims that lack end-to-end verification,
    # (b) blocks stopping while a PR this session CREATED is still open with
    # no explicit handoff — "waiting for reviewer" is not a stop state.
    # Existed as a script but was never wired; every issue-drain teammate
    # stopped with stranded PRs because nothing fired. Claude-only: relies on
    # last_assistant_message + exit-2 stderr feedback semantics.
    agents:
      - claude
    events:
      - Stop
    script: 00-agent-verify-work-complete.sh
    timeout: 20
  inject-repo-inflight:
    # SessionStart: inject open PRs + active sessions for the cwd repo so an
    # agent sees what is already owned before duplicating a PR's scope or
    # taking over a live session's surface. Fail-open on missing gh/agents.
    agents:
      - claude
      - codex
      - gemini
    events:
      - SessionStart
    script: 08-inject-repo-inflight.sh
    timeout: 10
  attention-sentinel:
    agents:
      - claude
    events:
      - Notification
      - Stop
      - UserPromptSubmit
    script: 06-attention-sentinel.sh
    timeout: 5
  inject-device-topology:
    agents:
      - claude
      - codex
      - gemini
    events:
      - SessionStart
    script: 07-inject-device-topology.sh
    timeout: 5
  session-identity:
    # Merged identity hook: session metadata + per-pid registry + Claude-gated
    # session-id injection, one stdin parse. Union of the three former hooks'
    # agent lists (04-capture-metadata, 07-inject-session-id, 08-register-pid).
    agents:
      - claude
      - codex
      - gemini
      - kimi
      - grok
      - antigravity
    events:
      - SessionStart
    script: 04-session-identity.sh
    timeout: 5
  mailbox-inject:
    # Drains the agent's mailbox (AGENTS_MAILBOX_DIR, set by agents-cli at spawn)
    # on every tool call and injects queued `agents message` context mid-run.
    # Claude only for now — the only harness where PreToolUse additionalContext
    # is verified to reach the model (Codex/Antigravity are probe-gated next).
    agents:
      - claude
    events:
      - PreToolUse
    script: 09-mailbox-inject.py
    timeout: 5
  git-guard:
    # Blocks destructive git ops (reset/checkout/stash/clean/rebase-outside-worktree,
    # force-push, branch delete, config write) on the agent's shell. Previously
    # defined under a stray `run:` key (never parsed) and removed in 8b006a6 as
    # "legacy"; re-wired here correctly under `hooks:`.
    agents:
      - claude
      - codex
      - gemini
    events:
      - PreToolUse
    matcher: Bash
    script: git-guard.sh
    timeout: 5
  rm-guard:
    # Blocks `rm -r` on protected paths ($HOME, ~/.ssh, /, ~/src, …). Re-wired
    # (see git-guard note).
    agents:
      - claude
      - codex
      - gemini
    events:
      - PreToolUse
    matcher: Bash
    script: rm-guard.sh
    timeout: 5
  git-require-clean-tree:
    # Blocks `git pull`/`rebase`/`--autostash` on a dirty tree (would destroy
    # uncommitted work).
    agents:
      - claude
      - codex
      - gemini
    events:
      - PreToolUse
    matcher: Bash
    script: 01-git-require-clean-tree.sh
    timeout: 5
