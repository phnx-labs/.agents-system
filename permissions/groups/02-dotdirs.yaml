  - "Bash(cat ~/.agents/:*)"
  - "Bash(head ~/.agents:*)"
  - "Bash(head ~/.agents/:*)"
  - "Bash(tail ~/.agents:*)"
  - "Bash(tail ~/.agents/:*)"
