  # Read is allow-listed broadly so agents can inspect any file in the project,
  # including dotfiles and config. Credential paths (~/.ssh, ~/.aws/credentials,
  # ~/.config/gcloud, ~/.netrc, ~/.pgpass, ~/.docker/config.json, ~/.npmrc) are
  # explicitly denied in 99-deny.yaml.
  - "Read"

  # Write/Edit is scoped: scratch space + the agents-cli config dirs.
  # Project-level edits (cwd) require explicit user approval.
  - "Write(/tmp/*)"
  - "Write(/tmp/**)"
  - "Edit(/tmp/*)"
  - "Edit(/tmp/**)"
  - "Edit(~/.claude.json)"
  - "Write(~/.claude/*)"
  - "Write(~/.claude/**)"
  - "Edit(~/.claude/*)"
  - "Edit(~/.claude/**)"
  - "Write(~/.agents/*)"
  - "Write(~/.agents/**)"
  - "Edit(~/.agents/*)"
  - "Edit(~/.agents/**)"
