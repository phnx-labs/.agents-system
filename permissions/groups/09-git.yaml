  # Git — read-only + commit/push/clone/fetch/worktree.
  # Normal branch creation/switching is denied; use git worktree add -b under
  # <repo>/.agents/worktrees/<slug>/ for PR-bound coding work.
  # Destructive operations (reset, checkout, switch, branch, stash, rebase, cherry-pick,
  # revert, clean, reflog, filter-branch, gc, prune, fsck, force-push) are denied
  # in 99-deny.yaml.
