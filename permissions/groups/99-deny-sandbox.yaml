deny:
  # Sandbox-only deny list. Applied when AGENTS_PERMISSION_SET=sandbox.
  #
  # Philosophy: the pod is ephemeral and non-root. Only block operations whose
  # blast radius escapes the pod (remote git state, credentials that unlock
  # external systems). Everything else — find, sudo, wget, local git ops —
  # is allowed, because a destructive local command just destroys scratch state.

  # Remote blast radius — affects the shared git remote
  - "Bash(git push --force:*)"
  - "Bash(git push -f:*)"
  - "Bash(git filter-branch:*)"

  # Credentials — unlock remote systems even from a dead pod
  - "Read(~/.ssh/**)"
  - "Edit(~/.ssh/**)"
  - "Read(~/.codex/auth.json)"
  - "Edit(~/.codex/auth.json)"
  - "Read(~/.claude/*.json)"
  - "Edit(~/.claude/*.json)"
