deny:
  - "Bash(find:*)"
  - "Bash(sudo:*)"
  - "Bash(wget:*)"
  - "Bash(timeout:*)"
  - "Read(~/.ssh/**)"
  - "Edit(~/.ssh/**)"

  # Git - dangerous commands that rewrite history or lose work
  - "Bash(git reset:*)"
  - "Bash(git rebase:*)"
  - "Bash(git push --force:*)"
  - "Bash(git push -f:*)"
  - "Bash(git clean:*)"
  - "Bash(git checkout -f:*)"
  - "Bash(git merge --abort:*)"
  - "Bash(git revert:*)"
  - "Bash(git cherry-pick:*)"
  - "Bash(git reflog:*)"
  - "Bash(git filter-branch:*)"
  - "Bash(git gc:*)"
  - "Bash(git prune:*)"
  - "Bash(git fsck:*)"
  - "Bash(git stash drop:*)"
  - "Bash(git stash clear:*)"
  - "Bash(git branch -D:*)"
  - "Bash(git config:*)"
