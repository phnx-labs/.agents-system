deny:
  - "Bash(find:*)"
  - "Bash(sudo:*)"
  - "Bash(wget:*)"
  - "Bash(timeout:*)"

  # Credential files — never allow agents to read or write these.
  - "Read(~/.ssh/**)"
  - "Edit(~/.ssh/**)"
  - "Write(~/.ssh/**)"
  - "Read(~/.aws/credentials)"
  - "Edit(~/.aws/credentials)"
  - "Write(~/.aws/credentials)"
  - "Read(~/.aws/config)"
  - "Edit(~/.aws/config)"
  - "Read(~/.config/gcloud/**)"
  - "Edit(~/.config/gcloud/**)"
  - "Write(~/.config/gcloud/**)"
  - "Read(~/.config/op/**)"
  - "Edit(~/.config/op/**)"
  - "Read(~/.netrc)"
  - "Edit(~/.netrc)"
  - "Write(~/.netrc)"
  - "Read(~/.pgpass)"
  - "Edit(~/.pgpass)"
  - "Write(~/.pgpass)"
  - "Read(~/.docker/config.json)"
  - "Edit(~/.docker/config.json)"
  - "Read(~/.npmrc)"
  - "Edit(~/.npmrc)"
  - "Read(~/.kube/config)"
  - "Edit(~/.kube/config)"

  # Git - dangerous commands that rewrite history or lose work.
  # `git push --force` is blocked; `--force-with-lease` is permitted because
  # it refuses to overwrite if the remote has advanced.
  - "Bash(git reset:*)"
  - "Bash(git push --force:*)"
  - "Bash(git push -f:*)"
  - "Bash(git clean:*)"
  - "Bash(git checkout:*)"
  - "Bash(git branch:*)"
  - "Bash(git merge --abort:*)"
  - "Bash(git revert:*)"
  - "Bash(git cherry-pick:*)"
  - "Bash(git reflog:*)"
  - "Bash(git filter-branch:*)"
  - "Bash(git gc:*)"
  - "Bash(git prune:*)"
  - "Bash(git fsck:*)"
  - "Bash(git stash:*)"
  - "Bash(git branch -D:*)"
  - "Bash(git config:*)"
