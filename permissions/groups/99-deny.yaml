deny:
  - "Bash(find:*)"
  - "Bash(sudo:*)"
  - "Bash(wget:*)"
  - "Bash(timeout:*)"
  - "Read(~/.ssh/**)"
  - "Edit(~/.ssh/**)"

  # Git - dangerous commands that rewrite history or lose work.
  # `git push --force` is blocked; `--force-with-lease` is permitted because
  # it refuses to overwrite if the remote has advanced.
  - "Bash(git reset:*)"
  - "Bash(git push --force:*)"
  - "Bash(git push -f:*)"
  - "Bash(git clean:*)"
  - "Bash(git checkout:*)"
  - "Bash(git branch:*)"
  - "Bash(git merge --abort:*)"
  - "Bash(git revert:*)"
  - "Bash(git cherry-pick:*)"
  - "Bash(git reflog:*)"
  - "Bash(git filter-branch:*)"
  - "Bash(git gc:*)"
  - "Bash(git prune:*)"
  - "Bash(git fsck:*)"
  - "Bash(git stash:*)"
  - "Bash(git branch -D:*)"
  - "Bash(git config:*)"
