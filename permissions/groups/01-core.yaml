  # Core shell utilities
  - "Bash(cat /tmp:*)"
  - "Bash(cat /tmp/claude:*)"
  - "Bash(cp /tmp:*)"
  - "Bash(head /tmp:*)"
  - "Bash(ls /tmp:*)"
  - "Bash(mkdir -p:~/.claude/*)"
  - "Bash(mkdir -p:~/.claude/**)"
  - "Bash(mkdir -p:~/.rush/*)"
  - "Bash(mkdir -p:~/.rush/**)"
  - "Bash(mkdir /tmp:*)"
  - "Bash(mv /tmp:*)"
  - "Bash(rm /tmp:*)"
  - "Bash(tail /tmp:*)"
  - "Bash(touch /tmp:*)"
  - "Bash(while read dir)"
  - "Bash(xargs go test:*)"
  - "Bash(xargs kill:*)"
