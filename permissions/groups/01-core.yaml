  # Core shell utilities
  - "Bash(cat /tmp:*)"
  - "Bash(cat /tmp/claude:*)"
  - "Bash(cp /tmp:*)"
  - "Bash(head /tmp:*)"
  - "Bash(ls /tmp:*)"
  - "Bash(mkdir -p:~/.claude/*)"
  - "Bash(mkdir -p:~/.claude/**)"
  - "Bash(mkdir -p:~/.rush/*)"
  - "Bash(mkdir -p:~/.rush/**)"
  - "Bash(mkdir /tmp:*)"
  - "Bash(mv /tmp:*)"
  - "Bash(rm /tmp:*)"
  - "Bash(tail /tmp:*)"
  - "Bash(touch /tmp:*)"
  - "Bash(while read dir)"
  - "Bash(xargs go test:*)"
  - "Bash(xargs kill:*)"

  # Read-only commands with 2>/dev/null (stderr suppression)
  - "Bash(ls * 2>/dev/null*)"
  - "Bash(cat * 2>/dev/null*)"
  - "Bash(head * 2>/dev/null*)"
  - "Bash(tail * 2>/dev/null*)"
  - "Bash(wc * 2>/dev/null*)"
  - "Bash(file * 2>/dev/null*)"
  - "Bash(stat * 2>/dev/null*)"
  - "Bash(which * 2>/dev/null*)"
  - "Bash(command -v * 2>/dev/null*)"
  - "Bash(type * 2>/dev/null*)"
  - "Bash(diff * 2>/dev/null*)"
  - "Bash(grep * 2>/dev/null*)"
  - "Bash(rg * 2>/dev/null*)"
  - "Bash(readlink * 2>/dev/null*)"
