# agents-cli rules — single default preset
#
# Includes all subrules from `<repo>/rules/subrules/`.
# Linear tickets context is injected by hooks/03-linear-inject-tasks-context.sh.
# Script/release discipline lives in the `scripts` skill.

presets:
  default:
    subrules:
      - core-hard-lines
      - workflow-proactive
      - code-quality
      - testing-strict
      - git-readonly
      - git-workflow
      - operational
      - conventions
      - agents-cli
      - parallel-teams
      - tech-stack
