# agents-cli rules — single default preset
#
# Includes all subrules from `<repo>/rules/subrules/`.
# Linear tickets context is injected by hooks/03-linear-inject-tasks-context.sh.
# Release/publish discipline lives in the `release` skill.

presets:
  default:
    subrules:
      - core-hard-lines
      - workflow-proactive
      - code-quality
      - testing-strict
      - truly-agentic-git-workflow
      - gh-merge-guard
      - no-pr-footer
      - operational
      - conventions
      - agents-cli
      - parallel-teams
      - tech-stack
      - context-query-mq
      - plan-presentation
