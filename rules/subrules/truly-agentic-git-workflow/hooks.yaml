# Hook bundled with the truly-agentic-git-workflow subrule. agents-cli folds this
# into the hook manifest (collectSubruleHooks) and registers it as a PreToolUse
# guard. The script resolves relative to this directory.
#
# One entry, one script, one combined matcher: the guard fires on Bash (to gate
# `git commit|add`) and on the file tools (to gate create/update/delete), and
# dispatches internally on tool_name.
main-branch-guard:
  script: main-branch-guard.sh
  events: [PreToolUse]
  matcher: "Bash|Write|Edit|MultiEdit|NotebookEdit"
  timeout: 5
