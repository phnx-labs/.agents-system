# Hook bundled with the plan-presentation subrule. agents-cli folds this into the
# hook manifest (collectSubruleHooks) and registers it as a PreToolUse guard. The
# script resolves relative to this directory.
#
# One entry: fires on ExitPlanMode. If no fresh plan HTML was rendered this session,
# it blocks the tool once with a reminder to render the plan (plan-render skill) and
# open it on the user's Mac — then the agent renders and re-calls ExitPlanMode, which
# now passes. Self-terminating; never loops.
plan-html-reminder:
  script: plan-html-reminder.sh
  events: [PreToolUse]
  matcher: "ExitPlanMode"
  timeout: 5
